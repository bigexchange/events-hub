<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BigID AIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff3592;--purple:#8735ff;--orange:#ff6b35;--bg:#f4f4f5;--bg2:#e9e9ec;--surface:#fff;--surface2:#ededf0;--border:rgba(110,100,140,0.12);--border2:rgba(110,100,140,0.18);--text:#1b1b1f;--text2:#3b3a42;--muted:#7c7b86;--muted2:#a3a2ac;--grad:linear-gradient(135deg,#8735ff 0%,#ff3592 55%,#ff6b35 100%);}
[data-theme="dark"]{--bg:#0f0e14;--bg2:#1a1825;--surface:#1a1825;--surface2:#221f2e;--border:rgba(135,53,255,0.18);--border2:rgba(135,53,255,0.25);--text:#f0eef8;--text2:#c4bfe0;--muted:#8c87a6;--muted2:#6b6688;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;}
header::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad);}
[data-theme="dark"] header{background:rgba(15,14,20,0.9);}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-wrap img{height:26px;width:auto;}
.hub-label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;border-left:1px solid var(--border2);padding-left:10px;}
.header-right{display:flex;align-items:center;gap:8px;}
.theme-toggle{width:34px;height:34px;border-radius:9px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;}
.theme-toggle:hover{border-color:rgba(135,53,255,0.4);}
[data-theme="dark"] .theme-toggle{background:#221f2e;border-color:rgba(135,53,255,0.3);}
.hero{padding:44px 28px 32px;max-width:760px;margin:0 auto;text-align:center;}
.hero-eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero h1{font-size:clamp(24px,3.5vw,36px);font-weight:700;margin-bottom:10px;}
.grad-word{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:14px;color:var(--muted);margin-bottom:28px;font-weight:300;}
.search-wrap{position:relative;max-width:580px;margin:0 auto 16px;}
.search-box{width:100%;background:var(--surface);border:1.5px solid var(--border2);border-radius:14px;padding:14px 120px 14px 46px;font-size:15px;font-family:"DM Sans",sans-serif;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;}
.search-box::placeholder{color:var(--muted2);}
.search-box:focus{border-color:rgba(135,53,255,.4);box-shadow:0 0 0 3px rgba(135,53,255,.08);}
[data-theme="dark"] .search-box{background:#221f2e;color:#f0eef8;border-color:rgba(135,53,255,.25);}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:16px;pointer-events:none;}
.ai-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:var(--grad);border:none;border-radius:10px;padding:8px 15px;color:#fff;font-size:12px;font-weight:700;font-family:"DM Sans",sans-serif;cursor:pointer;transition:opacity .2s;}
.ai-btn:hover{opacity:.85;}
.chips{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;max-width:580px;margin:0 auto;}
.chip{font-size:12px;font-weight:500;color:var(--text2);background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:5px 13px;cursor:pointer;transition:all .15s;font-family:"DM Sans",sans-serif;}
.chip:hover{border-color:rgba(135,53,255,.35);color:var(--purple);}
[data-theme="dark"] .chip{background:#1a1825;color:#c4bfe0;border-color:rgba(135,53,255,.2);}
.ai-panel{display:none;max-width:860px;margin:0 auto 24px;padding:0 28px;}
.ai-panel.on{display:block;}
.ai-box{background:var(--surface);border:1.5px solid rgba(135,53,255,.2);border-radius:14px;padding:18px 22px;position:relative;overflow:hidden;}
.ai-box::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--grad);}
[data-theme="dark"] .ai-box{background:#1a1825;}
.ai-badge{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:var(--grad);padding:3px 9px;border-radius:20px;}
.ai-text{font-size:13px;line-height:1.7;color:var(--text2);margin-top:10px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.main{max-width:1400px;margin:0 auto;padding:0 28px 80px;display:grid;grid-template-columns:210px 1fr;gap:24px;transition:grid-template-columns .3s;}
.main.panel-open{grid-template-columns:210px 1fr 300px;}
@media(max-width:1100px){.main.panel-open{grid-template-columns:210px 1fr;}.right-panel{display:none!important;}}
@media(max-width:768px){.main{grid-template-columns:1fr!important;}.sidebar{position:static!important;}}
.sidebar{position:sticky;top:76px;height:fit-content;}
.insight-sidebar{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.is-eyebrow{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:5px;}
.is-body{font-size:12px;line-height:1.65;color:var(--muted);font-style:italic;transition:opacity .35s;}
.is-body strong{color:var(--text2);font-style:normal;font-weight:600;}
.is-next{margin-top:8px;font-size:10px;font-weight:600;color:var(--muted2);cursor:pointer;background:none;border:none;padding:0;font-family:inherit;letter-spacing:.04em;display:block;transition:color .15s;}
.is-next:hover{color:var(--purple);}
.filter-group{margin-bottom:24px;}
.filter-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:7px;}
.filter-options{display:flex;flex-direction:column;gap:2px;}
.fbtn{background:none;border:none;text-align:left;padding:7px 11px;border-radius:7px;font-size:12px;font-family:"DM Sans",sans-serif;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.fbtn:hover{background:var(--surface);color:var(--text);}
.fbtn.active{background:#e8e8ec;color:#2d2c31;font-weight:600;border-left:2px solid var(--purple);padding-left:9px;}
[data-theme="dark"] .fbtn:hover{background:#221f2e;color:#f0eef8;}
[data-theme="dark"] .fbtn.active{background:rgba(135,53,255,.15);color:#f0eef8;}
.fbtn .cnt{font-size:10px;color:var(--muted2);font-family:"DM Mono",monospace;}
.fbtn.active .cnt{color:#2d2c31;}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.results-count{font-size:13px;color:var(--muted);}
.results-count span{color:var(--text);font-weight:700;}
.sort-sel{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:5px 11px;font-size:12px;font-family:"DM Sans",sans-serif;color:var(--text2);cursor:pointer;outline:none;}
[data-theme="dark"] .sort-sel{background:#1a1825;color:#c4bfe0;border-color:rgba(135,53,255,.2);}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;animation:cardIn .3s ease both;}
.card:hover{transform:translateY(-3px);border-color:rgba(135,53,255,.3);box-shadow:0 10px 28px rgba(80,70,120,.1);}
@keyframes cardIn{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
[data-theme="dark"] .card{background:#1a1825;border-color:rgba(135,53,255,.15);}
[data-theme="dark"] .card:hover{border-color:rgba(135,53,255,.45);}
.card-thumb{height:110px;position:relative;display:flex;align-items:center;justify-content:center;}
.card-type-badge{position:absolute;top:9px;left:9px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 8px;border-radius:20px;}
.card-icon{font-size:28px;}
.card-body{padding:12px 14px 8px;}
.card-title{font-size:13px;font-weight:700;line-height:1.4;margin-bottom:5px;color:var(--text);}
.new-badge{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:1px 6px;border-radius:20px;background:linear-gradient(135deg,#ff3592,#ff6b35);color:#fff;margin-left:5px;vertical-align:middle;}
.card-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{font-size:10px;color:var(--muted);background:var(--bg2);border-radius:5px;padding:2px 6px;border:1px solid var(--border);}
.card-footer{padding:7px 14px 10px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;}
.card-stage{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.card-actions{display:flex;gap:8px;align-items:center;}
.action-btn{font-size:11px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;font-family:"DM Sans",sans-serif;transition:color .15s;}
.action-btn:hover{color:var(--purple);}
.action-btn.added{color:var(--purple);}
.right-panel{display:none;position:sticky;top:76px;height:fit-content;max-height:calc(100vh - 100px);overflow-y:auto;}
.right-panel.on{display:block;animation:fadeUp .3s ease;}
.rp-box{background:var(--surface);border:1.5px solid rgba(135,53,255,.2);border-radius:14px;overflow:hidden;}
[data-theme="dark"] .rp-box{background:#1a1825;}
.rp-header{padding:13px 15px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.rp-eyebrow{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:2px;}
.rp-topic{font-size:13px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.rp-close{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:13px;padding:0;}
.rp-body{padding:13px 15px 15px;}
.rp-section{margin-bottom:16px;}
.rp-section-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:7px;}
.rp-diff{display:flex;gap:7px;padding:7px 9px;background:var(--bg);border-radius:8px;margin-bottom:5px;border:1px solid var(--border);font-size:12px;line-height:1.5;color:var(--text2);}
[data-theme="dark"] .rp-diff{background:#221f2e;}
.rp-obj{padding:8px 10px;background:rgba(255,53,146,.05);border:1px solid rgba(255,53,146,.15);border-radius:8px;margin-bottom:5px;font-size:11px;line-height:1.55;color:var(--text2);}
.rp-obj-q{font-size:10px;font-weight:700;color:var(--pink);display:block;margin-bottom:3px;}
.rp-ask{padding:7px 9px;background:rgba(135,53,255,.05);border:1px solid rgba(135,53,255,.15);border-radius:7px;margin-bottom:5px;font-size:11px;line-height:1.5;color:var(--text2);font-style:italic;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,20,50,.35);backdrop-filter:blur(8px);z-index:1000;align-items:center;justify-content:center;padding:24px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1.5px solid rgba(135,53,255,.15);border-radius:18px;max-width:580px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(80,70,120,.15);animation:fadeUp .22s ease;}
[data-theme="dark"] .modal{background:#1a1825;}
.grad-rule{height:3px;background:var(--grad);border:none;margin:0;}
.modal-top{padding:14px 18px 0;display:flex;justify-content:flex-end;}
.modal-close{background:var(--bg2);border:1px solid var(--border2);border-radius:7px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:13px;}
.modal-title{font-size:18px;font-weight:700;line-height:1.3;margin-bottom:7px;color:var(--text);}
.modal-desc{font-size:13px;color:var(--text2);line-height:1.65;}
.modal-meta{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:18px;background:var(--bg);border-radius:9px;padding:13px;border:1px solid var(--border);}
.modal-meta label{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:3px;}
.modal-meta span{font-size:12px;color:var(--text);font-weight:600;}
.modal-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn-primary{flex:1;padding:10px 16px;background:var(--grad);border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:700;font-family:"DM Sans",sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;text-decoration:none;}
.btn-primary:hover{opacity:.85;}
.btn-secondary{padding:10px 16px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:9px;color:var(--text2);font-size:13px;font-weight:600;font-family:"DM Sans",sans-serif;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px;}
.btn-secondary:hover{border-color:rgba(135,53,255,.35);color:var(--purple);}
.bundle-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1.5px solid var(--border2);padding:11px 28px;display:flex;align-items:center;justify-content:space-between;gap:14px;z-index:500;transform:translateY(100%);transition:transform .3s;}
.bundle-bar.on{transform:translateY(0);}
[data-theme="dark"] .bundle-bar{background:#1a1825;}
.bundle-left{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap;}
.bundle-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.bundle-items-wrap{display:flex;gap:5px;flex-wrap:wrap;}
.bundle-chip{font-size:11px;background:var(--bg2);color:var(--text2);border:1px solid var(--border);border-radius:20px;padding:3px 9px;display:flex;align-items:center;gap:5px;}
.bundle-chip-x{cursor:pointer;color:var(--muted);background:none;border:none;padding:0;font-size:11px;}
.bundle-actions{display:flex;gap:7px;}
.bundle-clear{padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;background:none;border:1px solid var(--border2);color:var(--muted);cursor:pointer;font-family:"DM Sans",sans-serif;}
.bundle-email{padding:7px 16px;border-radius:7px;font-size:12px;font-weight:700;background:var(--grad);border:none;color:#fff;cursor:pointer;font-family:"DM Sans",sans-serif;}
.email-overlay{display:none;position:fixed;inset:0;background:rgba(30,20,50,.4);backdrop-filter:blur(8px);z-index:1001;align-items:center;justify-content:center;padding:24px;}
.email-overlay.open{display:flex;}
.email-modal{background:var(--surface);border:1.5px solid rgba(135,53,255,.2);border-radius:18px;max-width:520px;width:100%;overflow:hidden;animation:fadeUp .22s ease;}
[data-theme="dark"] .email-modal{background:#1a1825;}
.email-modal-header{padding:16px 20px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.email-modal-header h3{font-size:15px;font-weight:700;}
.email-modal-body{padding:14px 20px 18px;}
.tmpl-sel{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:8px 11px;font-size:13px;font-family:"DM Sans",sans-serif;color:var(--text);outline:none;margin-bottom:11px;cursor:pointer;}
.email-ta{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:9px;padding:11px;font-size:12px;font-family:"DM Sans",sans-serif;color:var(--text);outline:none;resize:vertical;min-height:180px;line-height:1.6;}
[data-theme="dark"] .email-ta{background:#0f0e14;color:#f0eef8;}
.email-footer{padding:0 20px 16px;display:flex;gap:8px;justify-content:flex-end;}
.toast{position:fixed;bottom:80px;right:24px;background:var(--surface);border:1.5px solid rgba(135,53,255,.25);border-radius:9px;padding:10px 16px;font-size:12px;font-weight:600;color:var(--text);z-index:2000;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;}
.toast.on{opacity:1;transform:translateY(0);}
.empty{text-align:center;padding:60px 20px;color:var(--muted);display:none;}
.empty.on{display:block;}
.dots{display:inline-flex;gap:4px;align-items:center;}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--purple);animation:dot 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;background:var(--pink);}
.dots span:nth-child(3){animation-delay:.4s;background:var(--orange);}
@keyframes dot{0%,80%,100%{transform:scale(.7);opacity:.35}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>

gsF60DqGH3Kx5k/edit", "desc": "BigID and Forcepoint represent distinct approaches to Data Security Posture Management (DSPM). BigID offers a vendor-agnostic, metadata-driven platform, while Forcepoint’s DSPM is derived from its Getvisibility acquisition and is tightly integrated into the broader Forcepoint security portfolio.", "tags": ["Forcepoint", "DSPM Competition"], "icon": "⚔️", "recent": true, "popular": false, "dimitri": false}, {"id": 45, "title": "Agentic Detection and Response: Monitoring AI Agentic Activity", "type": "whitepaper", "topic": "Access Governance", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/drive/folders/1Uz-pMAtayct6-wB0AGSxdkj-lYinGp92", "desc": "As AI agents increasingly access and act on sensitive data, Agentic Detection and Response (ADR) is necessary for continuous monitoring, detection, and remediation of both human and non-human actors. ADR, which BigID enables through Data Activity Monitoring, shifts security focus from identity to real data interaction to manage risk from autonomous AI systems", "tags": ["Non-human identity", "activity montioring", "agentic detection and response"], "icon": "📄", "recent": true, "popular": false, "dimitri": false}, {"id": 46, "title": "The Agentic Advantage: Redefining Metadata Management with AI", "type": "whitepaper", "topic": "Catalog", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1_3x8kArjpEUcNVqMtcO5R8dtWLL1KQdp/edit", "desc": "See how an agentic approach to metadata management changes the game: BigID combines automation, semantic search, and intelligent governance to eliminate manual effort and scale across structured and unstructured data. Move beyond outdated catalogs— discover how AI-powered agents can transform how you collect, curate, and control your metadata.", "tags": ["Catalog", "Metadata Management", "AI Governance"], "icon": "📄", "recent": true, "popular": false, "dimitri": false}, {"id": 47, "title": "Six Dimensions of AI Risk & Control", "type": "one-pager", "topic": "AI Security", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/11P01vdcerAxw1ADZzcomoVLY59idIemR/edit", "desc": "A quick pdf leave behind on how BigID enables AI controls, and our most common AI use cases", "tags": ["AI Security", "AI Governance"], "icon": "⚡", "recent": true, "popular": false, "dimitri": false}, {"id": 48, "title": "Internal Cheatsheet: BigID For AI", "type": "internal workbook", "topic": "BigID", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1EvcXbXbHrtPM5n78zTZCZbfnjotmjQrPLYFnFwpsz5M/edit", "desc": "A short guide on how to talk BigID for AI - with customer questions and talking points, discovery questions, and more.", "tags": ["AI Security", "AI Governance"], "icon": "📒", "recent": true, "popular": false, "dimitri": false}, {"id": 49, "title": "BigID Prompt Protection for AI", "type": "one-pager", "topic": "AI Security", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1gwaXBuqWTQtosFop-YLIrS8mIpWsm_rp/edit", "desc": "BigID Prompt Protection for AI helps organizations secure sensitive information in AI-powered applications by continuously detecting, redacting, and controlling sensitive data like PII and financial details in prompts and responses. This solution provides visibility, reduces exposure risks through policy enforcement, and helps accelerate investigations to enable safe AI adoption.", "tags": ["Prompt Protection", "AI Guardrails", "AI Security"], "icon": "⚡", "recent": true, "popular": false, "dimitri": false}, {"id": 50, "title": "WatchTower for AI and Data", "type": "one-pager", "topic": "BigID", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1hsZRwHF3a_n9Bi17vcLjDEeKIFlEV9tN/edit", "desc": "BigID's WatchTower for AI & Data provides continuous, organization-wide visibility across sensitive data, AI models, and pipelines to proactively monitor exposure, uncover anomalies, and take action before risks escalate into incidents. It delivers unified risk visibility, role-based oversight, and built-in remediation to help security, privacy, and governance teams manage evolving AI and data risks.", "tags": ["Reporting"], "icon": "⚡", "recent": true, "popular": false, "dimitri": false}, {"id": 51, "title": "Label, Govern, and Control Data Usage for AI", "type": "one-pager", "topic": "BigID", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1kan9Ms-N7rgl035pDDaaZwpFYEgZchu3/edit", "desc": "BigID's AI Data Labeling solution helps organizations classify and control data usage for AI at scale, automatically tagging data as \"approved,\" \"restricted,\" or \"prohibited\" based on policy, risk, or sensitivity to prevent sensitive or regulated data from entering LLMs, copilots, or prompts. This enables security and governance teams to build a trusted AI foundation by ensuring only authorized, AI-eligible data is used, reducing compliance gaps and security risks.", "tags": ["Labeling", "Labelling", "AI Labels"], "icon": "⚡", "recent": true, "popular": false, "dimitri": false}, {"id": 52, "title": "AI Trust, Risk, & Security Management (AI TRiSM)", "type": "one-pager", "topic": "AI TRiSM", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1DHJ2Uf1lSsXGZoy2iSJwq3xrxWPImujK/edit", "desc": "BigID for AI TRiSM (AI Trust, Risk, & Security Management) helps enterprises reduce AI risk by discovering unauthorized AI models (\"Shadow AI\") and risky data usage, enabling security and governance teams to detect, investigate, and take enforcement actions directly in-platform. It provides capabilities for continuous risk assessment, automated risk assessments against standards like NIST AI RMF, validating data trustworthiness, and centralized AI governance.", "tags": ["AI TRiSM"], "icon": "⚡", "recent": true, "popular": false, "dimitri": false}, {"id": 53, "title": "Cleanse AI Data to Mitigate Leakage and Strengthen Security Posture", "type": "one-pager", "topic": "AI Security", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1FOeRruki8sex_hIpzI3GNAlvaupY-_S9/edit", "desc": "BigID's Data Cleansing for AI solution helps organizations mitigate the risk of data leakage and strengthen their security posture by automatically redacting or tokenizing sensitive data before it enters generative AI pipelines or large language models (LLMs). This enables secure AI adoption by ensuring models are trained on policy-aligned, cleansed datasets while preserving data utility.", "tags": ["AI Cleansing", "AI Governance", "AI Security"], "icon": "⚡", "recent": true, "popular": false, "dimitri": false}, {"id": 54, "title": "The Ultimate Guide to Data Security, Privacy, Compliance, and Hygiene for AI", "type": "whitepaper", "topic": "AI Security", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/drive/folders/1Uz-pMAtayct6-wB0AGSxdkj-lYinGp92", "desc": "The whitepaper, \"The Ultimate Guide to Data Security, Privacy, Compliance, and Hygiene for AI,\" asserts that to safely harness generative AI, organizations must shift to a data-centric approach, prioritizing the governance, labeling, and compliance of unstructured data. BigID is presented as a solution to automate data cataloging, risk identification (including toxic content), and compliance to prepare secure and ethical data sets for AI models.", "tags": ["AI Governance", "AI Security", "AI Hygiene"], "icon": "📄", "recent": true, "popular": false, "dimitri": false}, {"id": 55, "title": "AI Risk & Readiness in the Enterprise: the 2025 Benchmark Report", "type": "industry research", "topic": "AI Governance", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1AHsWSG_1JWVbkrg5OduV91iHsoLbB0Vm/edit", "desc": "The \"AI Risk & Readiness in the Enterprise 2025 Report\" indicates that AI risk is outpacing governance, with organizations moving forward with AI adoption while leaving security and compliance behind. Key findings show that most organizations lack full confidence in securing AI-driven data, are unprepared for AI regulatory compliance, and nearly half have no formal AI security controls in place.", "tags": ["AI Readiness Report", "Statistics", "Industry Report"], "icon": "🔬", "recent": true, "popular": false, "dimitri": false}, {"id": 56, "title": "BigID Customer Journey & Maturity Model", "type": "whitepaper", "topic": "BigID", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1mEtd7vp-x5f22HHZ78BfB8oMpohR-Z7U/edit", "desc": "The BigID Customer Journey/Maturity Model  is designed to help customers quickly realize value and achieve outcomes across security, privacy, governance, and compliance. This model accelerates time-to-value by starting with foundational visibility (Discover) and progressing to remediation and risk reduction (Action & Sustain), aligning with goals across privacy, security, and governance.", "tags": ["Customer Journey", "Maturity Model"], "icon": "📄", "recent": true, "popular": false, "dimitri": false}, {"id": 57, "title": "At a Glance: BigID Competitive Comparison", "type": "one-pager", "topic": "BigID", "persona": "CISO", "stage": "Awareness", "url": "https://docs.google.com/presentation/d/1O1zAZIafYKtURcxichFciwe-XKq8of5it7KNPzwhp00/edit?slide=id.g395eda51d11_0_99#slide=id.g395eda51d11_0_99", "desc": "At a glance competitive feature comparison showing how BigID compares to Cyera, Securiti.ai, and Varonis across critical categories and capabiltiies.", "tags": ["Cyera", "Varonis", "Securiti.ai", "Competitive"], "icon": "⚔️", "recent": true, "popular": false, "dimitri": false}, {"id": 58, "title": "BigID vs. AWS Macie: Competitive Capability Comparison", "type": "one-pager", "topic": "AWS Macie", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1TrkWXuIjxoCNo49bdkw4CTYC6wlhc3JO", "desc": "This document provides a competitive comparison between the BigID Data Security Platform and AWS Macie. BigID is a comprehensive Data Security Platform (DSP) that includes DSPM, Data Access Governance (DAG), Data Activity Monitoring (DAM), DLP, and data labeling. In contrast, AWS Macie is a single-purpose data classification tool restricted to Amazon S3.", "tags": ["Amazon Macie", "AWS Macie", "Competitive"], "icon": "⚔️", "recent": true, "popular": false, "dimitri": false}, {"id": 59, "title": "BigID vs OneTrust", "type": "one-pager", "topic": "OneTrust", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/11svg9bp5Fgq35y1DlLKHMvA0_QB7u8wC", "desc": "BigID and OneTrust are both leading data privacy solutions, but BigID is positioned as a more comprehensive, enterprise-grade platform for data privacy and security.", "tags": ["OneTrust", "One Trust", "Competitive"], "icon": "⚔️", "recent": true, "popular": false, "dimitri": false}, {"id": 60, "title": "BigID vs Microsoft Purview", "type": "one-pager", "topic": "Microsoft Purview", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/14XDT1wlzi9-6N-o4_n1C43MxBtYFRVUF/view?usp=drive_link", "desc": "This document provides a competitive comparison between BigID and Microsoft Purview regarding data security, privacy, and governance platforms", "tags": ["Purview", "MSFT", "Competitive"], "icon": "⚔️", "recent": true, "popular": false, "dimitri": false}, {"id": 61, "title": "BigID vs Varonis", "type": "one-pager", "topic": "Varonis", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1qCBke5mG-dlhLEK_eJEwWRE0a8aYvDBz/view?usp=drive_link", "desc": "BigID and Varonis are both Data Security Platforms (DSPs) offering Data Security Posture Management (DSPM), Data Access Governance (DAG), and Data Access Management (DAM). While both platforms address similar security use cases, BigID provides a single, unified platform, whereas Varonis is fragmented across multiple incompatible products that lack an integrated experience.", "tags": ["Varonis", "VRNS", "Competitive"], "icon": "⚔️", "recent": true, "popular": false, "dimitri": false}, {"id": 62, "title": "BigID vs Securiti", "type": "one-pager", "topic": "Securiti", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1fIvPVehX5ClZ_kR_jnH-wntkGltPUJzf/view?usp=sharing", "desc": "This document compares BigID and Securiti, concluding that BigID is a more mature, production-ready solution for complex, large-scale enterprise data environments.Data Scanning and Classification", "tags": ["Securiti", "Securiti.ai", "Competitive"], "icon": "⚔️", "recent": true, "popular": false, "dimitri": false}, {"id": 63, "title": "The Customer Zero Security Playbook for the AI Era.pdf", "type": "whitepaper", "topic": "Security", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1gcxpSWT6QE__b-7Ys27WHwfsDr9AuJC5/view?usp=sharing", "desc": ". This CISO-driven approach is a practical guide for controlling data risk in an AI-first enterprise by answering critical questions regarding data visibility, risk explanation, risk reduction, breach response, and AI data governance.", "tags": ["CISO", "Security"], "icon": "📄", "recent": true, "popular": false, "dimitri": false}, {"id": 64, "title": "BigID + Informatica Metadata Exchange", "type": "one-pager", "topic": "Metadata Exchange", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1_eQ1u8v9IXpZlyJd1N35bqlrDR7j5cPh", "desc": "The BigID + Informatica Metadata Exchange solution enhances Informatica EDC by providing automated discovery, ML-driven classification, and sensitive data context to enrich metadata. This integration helps organizations achieve more accurate metadata, reduce risk, and enable AI-ready governance across structured, unstructured, and shadow data sources.", "tags": ["Informatica", "Metadata Exchange", "EDC"], "icon": "⚡", "recent": true, "popular": false, "dimitri": false}, {"id": 65, "title": "BigID + Alation Metadata Exchange", "type": "one-pager", "topic": "Metadata Exchange", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1yoU5soCNyraxU7QVFmwklRNsgUp3cLaq/edit", "desc": "The BigID + Alation Metadata Exchange solution enhances Alation's Data Catalog by automating the discovery, classification, and sensitive data tagging of structured and unstructured data at scale. This integration helps organizations enrich metadata with context on sensitivity and usage constraints to enable privacy-aware analytics, mitigate risk, and support AI governance.", "tags": ["Alation", "Metadata Exchange", "Data Catalog"], "icon": "⚡", "recent": true, "popular": false, "dimitri": false}, {"id": 66, "title": "BigID = Collibra Metadata Exchange", "type": "one-pager", "topic": "Metadata Exchange", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1sRscQnjAk3WgncD-ruPlcNeq0ZqyTlNH", "desc": "The BigID and Collibra Metadata Exchange solution integrates BigID's automated discovery, continuous metadata exchange, and AI-powered context with Collibra's governance workflows to enrich the catalog, accelerate adoption, and deliver stronger security, privacy, and governance outcomes. This partnership helps organizations overcome manual curation challenges by automating population and enrichment across all enterprise data, extending visibility to unstructured, sensitive, and AI-eligible data.", "tags": ["Collibra", "Metadata Exchange", "Data Catalog"], "icon": "⚡", "recent": true, "popular": false, "dimitri": false}, {"id": 67, "title": "Delegated Remediation", "type": "one-pager", "topic": "BigID", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1aXYNdWsrWfNUdnjITpPjeRsLY7H_MJ-E/view", "desc": "The BigID Data Remediation App automates and accelerates data remediation by using AI-driven prioritization and guided actions to reduce risk, strengthen compliance, and cleanse AI pipelines. It enables organizations to take native action at scale, such as deleting toxic data, masking regulated attributes, or revoking risky access, across structured, unstructured, SaaS, and cloud environments.", "tags": ["Remediation", "Revoke access", "AI Remediation"], "icon": "⚡", "recent": true, "popular": false, "dimitri": false}, {"id": 68, "title": "Activity Monitoring", "type": "one-pager", "topic": "BigID", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1SnGOnGW-hKDVQ4DCtJxVSiyxAJcCPbTn/view?usp=sharing", "desc": "BigID's Data Activity Monitoring (DAM) unifies visibility, monitoring, and remediation across various data sources like AWS S3, OneDrive, and Google Drive to detect insider threats, mitigate breach risk, and enforce Zero Trust with AI-powered insights. It provides continuous, contextual insight into who is accessing your data, when, how, and why, and includes capabilities like Activity Explorer, automated risk response, and audit reporting for compliance.", "tags": ["DAM", "DDR", "Activity Monitoring"], "icon": "⚡", "recent": true, "popular": false, "dimitri": false}, {"id": 69, "title": "ROI Analysis: Global Retail Customer", "type": "one-pager", "topic": "ROI Analysis", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1QdRhUGLu2d7zcmOJy_6xVD8_U-tW5HZl/view?usp=drive_link", "desc": "BigID's Value and ROI Analysis for a Global Retail Enterprise projects a 3-year probable total value of $61.35 million in risk reduction, cost optimization, and business acceleration, leading to an estimated Net ROI of 17x-25.6x against an estimated investment of $2.4M-$3.6M. The analysis is based on identifying over 586 active security cases and classifying 58.6 million data objects across the customer's multi-cloud Azure data estate, with immediate recommended actions targeting high-risk areas like Production Blob storage.", "tags": ["ROI", "Customer Value", "BigID Results"], "icon": "🌟", "recent": true, "popular": false, "dimitri": false}, {"id": 70, "title": "Redefining Data Lifecycle Management for the Modern Enterprise", "type": "whitepaper", "topic": "Data Lifecycle Management", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/18B_lR47Cp0ORYyYPmgESy_uhoBiYkME-/view?usp=sharing", "desc": "ata lifecycle management (DLM) is complex, extending beyond simple deletion, and requires specialized capabilities for identifying diverse ROT (Redundant, Obsolete, Trivial) data, managing retention schedules, conducting investigations, and safely executing deletion. BigID is presented as a unique and comprehensive DLM solution that addresses these challenges across structured and unstructured data, offering capabilities such as full-content scanning, flexible retention schedules, built-in workflow, and checks for legal hold and referential integrity.", "tags": ["Data Lifecycle", "Data Minimization", "Lifecycle Management"], "icon": "📄", "recent": true, "popular": false, "dimitri": false}, {"id": 71, "title": "Data Lifecycle Management", "type": "one-pager", "topic": "Data Lifecycle Management", "persona": "CISO", "stage": "Awareness", "url": "https://drive.google.com/file/d/1Ktp61jfsOdBf2YPYmbA6edEGK1GfbqKv/view?usp=sharing", "desc": "BigID offers an end-to-end data lifecycle management solution that uses AI-driven discovery and classification to identify, govern, and eliminate redundant, obsolete, and trivial (ROT) data. This platform helps organizations reduce their data footprint, mitigate AI risk, and ensure regulatory compliance through automated retention and secure deletion policies", "tags": ["Data Lifecycle", "Data Minimization", "Lifecycle Management"], "icon": "⚡", "recent": true, "popular": false, "dimitri": false}, {"id": 72, "title": "BigID Platform Diagram", "type": "slide-deck", "topic": "BigID", "persona": "CISO", "stage": "Awareness", "url": "https://docs.google.com/presentation/d/1   Object.keys(types).sort().forEach(function(t) {
    var color = TYPE_COLORS[t] || TYPE_COLORS.default;
    var label = TYPE_LABELS[t] || (t.charAt(0).toUpperCase() + t.slice(1) + 's');
    th += '<button class="fbtn" data-f="type" data-v="' + t + '" onclick="setF('type','' + t + '',this)">'
      + '<span style="display:flex;align-items:center;gap:7px"><span class="tdot" style="background:' + color + '"></span>' + label + '</span>'
      + '<span class="cnt">' + types[t] + '</span></button>';
  });

function setF(dim, val, el) {
  filters[dim] = val;
  document.querySelectorAll("[data-f='" + dim + "']").forEach(function(b){b.classList.remove("active");});
  el.classList.add("active");
  render();
  if (dim === "topic" && val !== "all") triggerPanel(val, val);
  else if (dim === "topic") closePanel();
}

function semanticScore(asset, query) {
  if (!query) return 1;
  var q = query.toLowerCase();
  var text = (asset.title + " " + asset.desc + " " + (asset.tags||[]).join(" ") + " " + asset.topic).toLowerCase();
  if (text.indexOf(q) > -1) return 10;
  var score = 0;
  q.split(/\s+/).filter(function(w){return w.length > 2;}).forEach(function(w){
    if (text.indexOf(w) > -1) score += 3;
  });
  return score;
}

function getFiltered() {
  var d = CONTENT.slice();
  if (filters.type !== "all") d = d.filter(function(c){return c.type === filters.type;});
  if (filters.topic !== "all") d = d.filter(function(c){return c.topic === filters.topic;});
  if (filters.stage !== "all") d = d.filter(function(c){return c.stage === filters.stage;});
  if (searchQ && searchQ.length > 1) {
    var scored = d.map(function(c){return {c:c, score:semanticScore(c,searchQ)};});
    scored = scored.filter(function(x){return x.score > 0;});
    scored.sort(function(a,b){return b.score - a.score;});
    d = scored.map(function(x){return x.c;});
  } else {
    if (document.getElementById("sortSel").value === "az")
      d.sort(function(a,b){return a.title.localeCompare(b.title);});
    else
      d.sort(function(a,b){return (b.recent?1:0)-(a.recent?1:0);});
  }
  return d;
}

function makeCard(c, i) {
  var tc = TC[c.type] || "#8735ff";
  var sc = SC[c.stage] || "#8735ff";
  var inBundle = bundle.some(function(b){return b.id === c.id;});
  var btnCls = inBundle ? "action-btn added" : "action-btn";
  var btnLbl = inBundle ? "&#x2713; Bundled" : "+ Bundle";
  var safetitle = c.title.replace(/&/g,"&amp;").replace(/"/g,"&quot;");
  var safeurl = c.url.replace(/&/g,"&amp;").replace(/"/g,"&quot;");
  var h = "";
  h += '<div class="card" style="animation-delay:' + (i*0.04) + 's" onclick="openModal(' + c.id + ')">';
  h += '<div class="card-thumb" style="background:linear-gradient(135deg,' + tc + '14,' + tc + '05)">';
  h += '<span class="card-type-badge" style="background:' + tc + '18;color:' + tc + ';border:1px solid ' + tc + '33">' + c.type + '</span>';
  h += '<span class="card-icon">' + (c.icon || "&#x1F4C4;") + '</span>';
  h += '</div>';
  h += '<div class="card-body">';
  h += '<div class="card-title">' + c.title + (c.recent ? '<span class="new-badge">New</span>' : '') + '</div>';
  h += '<div class="card-desc">' + c.desc + '</div>';
  h += '<div class="card-tags">';
  (c.tags||[]).slice(0,2).forEach(function(t){h += '<span class="tag">' + t + '</span>';});
  h += '</div></div>';
  h += '<div class="card-footer">';
  h += '<div class="card-actions">';
  h += '<button class="' + btnCls + '" data-id="' + c.id + '" data-title="' + safetitle + '" onclick="event.stopPropagation();toggleBundle(' + c.id + ',this.dataset.title,event)">' + btnLbl + '</button>';
  h += '<button class="action-btn" data-url="' + safeurl + '" data-title="' + safetitle + '" onclick="event.stopPropagation();copyLink(this.dataset.url,this.dataset.title)">&#x2398; Copy</button>';
  h += '</div></div></div>';
  return h;
}

function render() {
  var data = getFiltered();
  var grid = document.getElementById("cardsGrid");
  var empty = document.getElementById("emptyState");
  document.getElementById("resultsCount").innerHTML = "<span>" + data.length + "</span> asset" + (data.length !== 1 ? "s" : "");
  if (!data.length) { grid.innerHTML = ""; empty.classList.add("on"); return; }
  empty.classList.remove("on");
  var h = "";
  for (var i = 0; i < data.length; i++) h += makeCard(data[i], i);
  grid.innerHTML = h;
}

function toggleBundle(id, title, e) {
  if (e) e.stopPropagation();
  var idx = -1;
  for (var i = 0; i < bundle.length; i++) { if (bundle[i].id === id) { idx = i; break; } }
  if (idx > -1) { bundle.splice(idx, 1); }
  else { if (bundle.length >= 5) { showToast("Max 5 assets"); return; } bundle.push({id:id, title:title}); }
  updateBundle(); render();
}

}

  var main = document.getElementById("mainGrid");
  document.getElementById("rpTopic").textContent = topic || query;
  document.getElementById("rpBody").innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted)"><div class="dots"><span></span><span></span><span></span></div></div>';
  panel.classList.add("on"); main.classList.add("panel-open");
  setTimeout(function(){document.getElementById("rpBody").innerHTML = renderPanel(topic||query);}, 350);
}
function closePanel(){
  document.getElementById("rightPanel").classList.remove("on");
  document.getElementById("mainGrid").classList.remove("panel-open");
}

document.addEventListener("keydown", function(e){
  if (e.key === "Escape") {closeModal(); closeEmailModal(); closePanel();}
  var t = document.activeElement.tagName;
  if (t === "INPUT" || t === "TEXTAREA") return;
  if (e.key === "/") {e.preventDefault(); document.getElementById("searchInput").focus();}
  if (e.key === "l" || e.key === "L") surpriseMe();
});

var htmlEl = document.documentElement;
var toggleBtn = document.getElementById("themeToggle");
var saved = localStorage.getItem("aiq-theme") || "light";
htmlEl.setAttribute("data-theme", saved);
toggleBtn.textContent = saved === "dark" ? "\u2600\uFE0F" : "\uD83C\uDF19";
toggleBtn.addEventListener("click", function(){
  var next = htmlEl.getAttribute("data-theme") === "dark" ? "light" : "dark";
  htmlEl.setAttribute("data-theme", next);
  toggleBtn.textContent = next === "dark" ? "\u2600\uFE0F" : "\uD83C\uDF19";
  localStorage.setItem("aiq-theme", next);
});

var isIdx = Math.floor(Math.random() * INSIGHTS.length);
function isRender(){
  var ey = document.getElementById("isEye");
  var bo = document.getElementById("isBody");
  if (!ey || !bo) return;
  ey.textContent = INSIGHTS[isIdx].tag;
  bo.innerHTML = INSIGHTS[isIdx].text;
}
function isNext(){
  var b = document.getElementById("isBody");
  if (!b) return;
  b.style.opacity = "0";
  setTimeout(function(){isIdx=(isIdx+1)%INSIGHTS.length; isRender(); b.style.opacity="1";}, 300);
}
setInterval(isNext, 25000);

buildFilters();
render();
isRender();
</script>
</body>
</html>
